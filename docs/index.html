<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kmgccc_player - macOS 本地音乐播放器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="hero">
            <img src="assets/icon.png" alt="kmgccc_player" class="app-icon">

            <p class="tagline">面向 macOS 26 的本地音乐播放器<br>清晰界面 · 沉浸体验 · 歌词同步</p>
            <div class="buttons">
                <a href="https://github.com/kmgccc/player/releases/latest" class="btn btn-primary">下载最新版本</a>
                <a href="https://github.com/kmgccc/player" class="btn btn-secondary">GitHub 仓库</a>
            </div>
        </div>

        <div class="screenshots">
            <div class="screenshot-item">
                <img src="assets/screenshot1.png" alt="主界面">
            </div>
            <div class="screenshot-item">
                <img src="assets/screenshot2.png" alt="磁带播放器">
            </div>
        </div>
    </div>
