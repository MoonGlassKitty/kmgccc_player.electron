<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PV Embed - Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      background: #111;
      color: #fff;
      font-family: 'Noto Sans JP', sans-serif;
      display: flex;
      height: 100vh;
    }
    
    #sidebar {
      width: 280px;
      background: #1a1a1a;
      padding: 20px;
      overflow-y: auto;
      border-right: 1px solid #333;
    }
    
    #sidebar h2 {
      margin: 0 0 20px 0;
      font-size: 18px;
      color: #888;
    }
    
    .section {
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid #333;
    }
    
    .section:last-child {
      border-bottom: none;
    }
    
    .section-title {
      font-size: 14px;
      color: #666;
      margin-bottom: 10px;
      text-transform: uppercase;
    }
    
    label {
      display: block;
      margin-bottom: 5px;
      font-size: 12px;
      color: #999;
    }
    
    select, textarea {
      width: 100%;
      padding: 8px 12px;
      background: #222;
      border: 1px solid #444;
      color: #fff;
      border-radius: 4px;
      font-size: 13px;
      margin-bottom: 10px;
    }
    
    textarea {
      min-height: 80px;
      resize: vertical;
    }
    
    input[type="range"] {
      width: 100%;
      margin-bottom: 5px;
    }
    
    button {
      padding: 8px 16px;
      background: #333;
      border: 1px solid #555;
      color: #fff;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      margin-right: 5px;
      margin-bottom: 5px;
    }
    
    button:hover {
      background: #444;
    }
    
    button.primary {
      background: #0066cc;
      border-color: #0088ff;
    }
    
    button.primary:hover {
      background: #0088ff;
    }
    
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px;
    }
    
    #canvas-container {
      flex: 1;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }
    
    #controls {
      margin-top: 15px;
      display: flex;
      align-items: center;
      gap: 15px;
    }
    
    #time-display {
      font-family: monospace;
      font-size: 14px;
      color: #888;
      min-width: 80px;
    }
    
    #lyric-info {
      font-size: 12px;
      color: #666;
      margin-top: 10px;
    }
    
    .value-display {
      display: inline-block;
      min-width: 40px;
      text-align: right;
      color: #888;
    }
  </style>
</head>
<body>
  <div id="sidebar">
    <h2>PV Embed Demo</h2>
    
    <div class="section">
      <div class="section-title">Template</div>
      <select id="template-select">
        <option value="0">0 - 蓝色冲击</option>
        <option value="1">1 - 斩击</option>
        <option value="2">2 - 蓝色构成</option>
        <option value="3">3 - 赛博废墟</option>
        <option value="4">4 - 几何</option>
        <option value="5">5 - 黑客帝国</option>
        <option value="6">6 - 夜之城监控</option>
        <option value="7">7 - 情绪电影</option>
        <option value="8">8 - 歇斯底里之夜</option>
        <option value="9">9 - 蛛网</option>
        <option value="10">10 - 错落文字</option>
        <option value="11">11 - 冷静的反派</option>
        <option value="12">12 - 少女云朵</option>
        <option value="13">13 - 格子花边</option>
        <option value="14">14 - Fly Me to the Moon</option>
        <option value="15">15 - Kawaii像素</option>
      </select>
    </div>
    
    <div class="section">
      <div class="section-title">Lyrics</div>
      <select id="lyric-format">
        <option value="lrc">LRC</option>
        <option value="ttml-word">TTML 逐字</option>
        <option value="ttml-line">TTML 逐行</option>
      </select>
      <textarea id="lyric-input" placeholder="粘贴 LRC 或 TTML 歌词"></textarea>
      <button class="primary" id="load-lyrics">加载歌词</button>
    </div>
    
    <div class="section">
      <div class="section-title">Beat</div>
      <label>BPM: <span class="value-display" id="bpm-value">120</span></label>
      <input type="range" id="bpm-slider" min="60" max="200" value="120">
      <label>反应强度: <span class="value-display" id="react-value">0.5</span></label>
      <input type="range" id="react-slider" min="0" max="1" step="0.1" value="0.5">
    </div>
    
    <div class="section">
      <div class="section-title">Post FX</div>
      <label>Shake: <span class="value-display" id="shake-value">0</span></label>
      <input type="range" id="shake-slider" min="0" max="1" step="0.05" value="0">
      <label>Zoom: <span class="value-display" id="zoom-value">0</span></label>
      <input type="range" id="zoom-slider" min="-1" max="1" step="0.1" value="0">
      <label>Glitch: <span class="value-display" id="glitch-value">0</span></label>
      <input type="range" id="glitch-slider" min="0" max="1" step="0.05" value="0">
    </div>
    
    <div id="lyric-info"></div>
  </div>
  
  <div id="main">
    <div id="canvas-container"></div>
    <div id="controls">
      <button class="primary" id="play-btn">Play</button>
      <button id="pause-btn">Pause</button>
      <span id="time-display">00:00</span>
      <input type="range" id="time-slider" min="0" max="120" value="0" style="flex:1;">
      <span>/ 02:00</span>
    </div>
  </div>

  <script type="module">
    import { PVEmbed } from '/@fs/Users/kmg/Documents/vscode/player/myPlayer2/pv-embed/src/main.ts';
    
    const pv = new PVEmbed();
    let isPlaying = false;
    let animationId = null;
    
    async function init() {
      try {
        await pv.init('canvas-container');
        
        // TTML 逐字测试样例
        const ttmlWord = `<?xml version="1.0"?>
<tt xmlns="http://www.w3.org/ns/ttml">
<body>
<div>
<p begin="0.0" end="3.0">
<span begin="0.0" end="0.5">测</span>
<span begin="0.5" end="1.0">试</span>
<span begin="1.0" end="1.5">歌</span>
<span begin="1.5" end="2.0">词</span>
<span begin="2.0" end="2.5">第</span>
<span begin="2.5" end="3.0">一</span>
<span begin="3.0" end="3.5">行</span>
</p>
<p begin="4.0" end="7.0">
<span begin="4.0" end="4.5">这</span>
<span begin="4.5" end="5.0">是</span>
<span begin="5.0" end="5.5">第</span>
<span begin="5.5" end="6.0">二</span>
<span begin="6.0" end="6.5">行</span>
<span begin="6.5" end="7.0">词</span>
</p>
</div>
</body>
</tt>`;
        
        pv.setLyrics(ttmlWord, 'ttml-word');
        document.getElementById('lyric-info').textContent = '已加载: TTML 逐字测试';
        
        await pv.setArtwork('/artwork.jpg');
        
        pv.setMedia({ title: 'Demo Song', artist: 'PV Embed' });
        
        console.log('[Demo] Initialized successfully');
        startUpdateLoop();
      } catch (err) {
        console.error('[Demo] Init failed:', err);
        document.getElementById('lyric-info').textContent = '初始化失败: ' + err.message;
      }
    }
    
    function startUpdateLoop() {
      function update() {
        // 只更新 UI 显示，不推进时间
        // 时间由 engine 内部 ticker 统一推进
        const currentTime = pv.getCurrentTime();
        updateTimeDisplay(currentTime);
        
        animationId = requestAnimationFrame(update);
      }
      
      update();
    }
    
    function updateTimeDisplay(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      document.getElementById('time-display').textContent = 
        `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
      document.getElementById('time-slider').value = seconds;
    }
    
    document.getElementById('template-select').addEventListener('change', (e) => {
      pv.setTemplate(e.target.value);
    });
    
    document.getElementById('load-lyrics').addEventListener('click', () => {
      const text = document.getElementById('lyric-input').value;
      const format = document.getElementById('lyric-format').value;
      
      if (!text.trim()) {
        alert('请输入歌词内容');
        return;
      }
      
      const success = pv.setLyrics(text, format);
      document.getElementById('lyric-info').textContent = success ? `已加载: ${format}` : '解析失败';
    });
    
    document.getElementById('play-btn').addEventListener('click', () => {
      isPlaying = true;
      pv.play();
    });
    
    document.getElementById('pause-btn').addEventListener('click', () => {
      isPlaying = false;
      pv.pause();
    });
    
    document.getElementById('time-slider').addEventListener('input', (e) => {
      pv.setCurrentTime(parseFloat(e.target.value));
      updateTimeDisplay(parseFloat(e.target.value));
    });
    
    document.getElementById('bpm-slider').addEventListener('input', (e) => {
      const bpm = parseInt(e.target.value);
      pv.setBPM(bpm);
      document.getElementById('bpm-value').textContent = bpm;
    });
    
    document.getElementById('react-slider').addEventListener('input', (e) => {
      const val = parseFloat(e.target.value);
      pv.setBeatReactivity(val);
      document.getElementById('react-value').textContent = val.toFixed(1);
    });
    
    document.getElementById('shake-slider').addEventListener('input', (e) => {
      const val = parseFloat(e.target.value);
      pv.setShake(val);
      document.getElementById('shake-value').textContent = val.toFixed(2);
    });
    
    document.getElementById('zoom-slider').addEventListener('input', (e) => {
      const val = parseFloat(e.target.value);
      pv.setZoom(val);
      document.getElementById('zoom-value').textContent = val.toFixed(1);
    });
    
    document.getElementById('glitch-slider').addEventListener('input', (e) => {
      const val = parseFloat(e.target.value);
      pv.setGlitch(val);
      document.getElementById('glitch-value').textContent = val.toFixed(2);
    });
    
    init().catch(console.error);
    
    window.pv = pv;
  </script>
</body>
</html>
