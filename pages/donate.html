<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赞助 - kmgccc_player</title>
    <link rel="stylesheet" href="donate.css">
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← 返回首页</a>
        
        <header class="header">
            <h1>赞助</h1>
            <p class="subtitle">开源软件，自愿赞赏～</p>
        </header>

        <main class="donation-section">
            <div class="amount-selector">
                <p class="hint">选择金额</p>
                <div class="amount-buttons">
                    <button class="amount-btn" data-amount="5" data-wx="assets/wx5.jpeg" data-ap="assets/ap5.jpeg">
                        <span class="amount">¥5</span>
                        <span class="label">一顿拼好饭</span>
                    </button>
                    <button class="amount-btn" data-amount="16" data-wx="assets/wx16.jpeg" data-ap="assets/ap16.jpeg">
                        <span class="amount">¥16</span>
                        <span class="label">请我喝 Coco</span>
                    </button>
                    <button class="amount-btn" data-amount="30" data-wx="assets/wx30.jpeg" data-ap="assets/ap30.jpeg">
                        <span class="amount">¥30</span>
                        <span class="label">少写点 Bug</span>
                    </button>
                    <button class="amount-btn" data-amount="66" data-wx="assets/wx66.jpeg" data-ap="assets/ap66.jpeg">
                        <span class="amount">¥66</span>
                        <span class="label">感谢！</span>
                    </button>
                </div>
            </div>

            <div class="qr-section" id="qrSection">
                <div class="qr-wrapper">
                    <img id="wxQr" src="" alt="微信支付">
                    <img id="apQr" src="" alt="支付宝">
                </div>
                <p class="qr-hint">点击二维码可查看大图</p>
            </div>
        </main>
    </div>

    <script src="donate.js"></script>
</body>
</html>
